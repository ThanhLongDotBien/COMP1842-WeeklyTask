<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>lesson 7</title>
    <!-- Import Styles -->
    <link rel="stylesheet" href="./assets/styles.css" />
    <!-- Import Vue.js -->
    <script src="https://unpkg.com/vue@3.0.11/dist/vue.global.js"></script>
  </head>
  <body>
    <div id="app">
      <div class="nav-bar"></div>

      <div class="cart">Cart({{ cart }})</div>
      
      <div class="product-display">
        <div class="product-container">
          <!--challenge-->
          <div class="product-image">
            <img :class="{ 'out-of-stock-img': !inStock }" v-bind:src="image" width="100" height="200">
            <img v-bind:src="image" width="100" height="200">
          </div>
          <!--challenge-->                                                                <!--Ngo Quoc Cuong-->
          <div class="product-info">
            <h1>{{ product }}</h1>
            <p v-if="inStock">In Stock</p>
            <p v-else>Out of Stock</p>
            <div class="product-detail">
              <label>Detail of socks:</label>
              <ul>
                <li v-for="detail in details">{{ detail }}</li>
              </ul>
            </div>

            <!--exercise-->
            <div v-for="variant in variants" :key="variant.id" @mouseover="updateImage(variant.image)" class="color-circle" :style="{ backgroundColor: variant.color }"></div>
            
            <button class="button":class="{disabledButton: !inStock }":disabled="!inStock" @click="addToCart">Add to Cart</button>
            <!--/exercise-->
          </div>
        </div>
      </div>
    </div>

    <!-- Import App -->
    <script src="./main.js"></script>

    <!-- Mount App -->
    <script>
      const mountedApp = app.mount('#app')
    </script>
  </body>
</html>
